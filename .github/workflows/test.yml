name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: |
          if [ -f setup.sh ]; then
            echo "Template not yet scaffolded — skipping tests"
            exit 0
          fi
          node --test tests/*.test.js
